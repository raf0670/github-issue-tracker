<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and logo -->
    <title>GitHub Issue Tracker | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <section class="flex items-center h-screen">

        <div class="mx-auto card bg-base-100 w-full max-w-sm shrink-0 shadow-md">
            <div class="card-body">
                <div class="flex flex-col items-center">
                    <img src="./assets/github-logo.png" alt="" class="max-w-24 max-h-24 mb-4">
                    <h1 class="text-center text-[#1F2937] font-bold">GitHub Issues Tracker</h1>
                    <h2 class="text-center text-[#64748B]">Sign in to manage your issues</h2>
                </div>

                <fieldset class="fieldset">
                    <label class="label">Username</label>
                    <input id="login-username" type="text" class="input w-full" placeholder="Enter Username" />
                    <p class="text-[#4A00FF]">Default: admin</p>
                    <label class="label">Password</label>
                    <input id="login-password" type="password" class="input w-full" placeholder="Enter Password" />
                    <p class="text-[#4A00FF]">Default: admin123</p>
                    <button id="sign-in" class="btn btn-primary mt-4">Sign In</button>
                    <div class="flex items-center justify-center space-x-1 py-4">
                        <span class="w-1/2 text-[#a2a2a2]">
                            <hr>
                        </span>
                        <h3>OR</h3>
                        <span class="w-1/2 text-[#a2a2a2]">
                            <hr>
                        </span>
                    </div>

                    <div class="flex flex-col items-center space-y-4">
                        <h3 class="text-[#64748B]">Demo Credentials</h3>
                        <div class="bg-[#F8FAFC] rounded-sm p-6 w-full">
                            <p class="text-[#1F2937] text-center"><span class="font-bold">Username:</span> admin<br><span class="font-bold">Password:</span> admin123</p>
                        </div>
                    </div>
                </fieldset>
            </div>
        </div>
    </section>

    <script src="./js/index.js"></script>
</body>

</html>
