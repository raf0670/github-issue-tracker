<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and logo -->
    <title>GitHub Issue Tracker | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisy ui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav>
        <div class="navbar bg-base-100 shadow-sm space-x-3">
            <div class="navbar-start flex gap-3">
                <img src="./assets/github-logo.png" alt="" class="max-w-9 max-h-9">
                <h1 class="font-bold text-xl">GitHub Issues Tracker</h1>
            </div>
            <div class="navbar-end space-x-3 flex flex-col sm:flex-row gap-2">
                <label class="input max-w-72">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="input-search" type="search" required placeholder="Search Issues..." />
                </label>

                <button id="btn-search" class="btn btn-primary text-lg">
                    Search
                </button>
            </div>
        </div>
    </nav>

    <main class="w-9/12 mx-auto py-16">

        <header class="mb-6 p-6 flex flex-wrap gap-4 shadow-md rounded-md ">
            <button onclick="setButton(`home-all`)" id="home-all"
                class="btn btn-primary font-semibold w-24">All</button>

            <button onclick="setButton(`home-open`)" id="home-open"
                class="btn bg-white text-gray-600 font-semibold outline-gray-600 w-24">Open</button>

            <button onclick="setButton(`home-closed`)" id="home-closed"
                class="btn bg-white text-gray-600 font-semibold outline-gray-600 w-24">Closed</button>
        </header>

        <section class="border-b border-b-gray-200 p-6 shadow-md rounded-t-md">
            <div class="flex justify-between flex-wrap items-center">
                <div class="left flex gap-6">
                    <div class="p-2 bg-purple-200 rounded-full"><img src="./assets/Aperture.png" alt=""></div>
                    <div class="font-bold text-xl">
                        <p><span id="total-issues">0</span> Issues</p>
                        <p class="text-[#64748B] font-normal text-sm">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="right flex flex-col sm:flex-row gap-3 font-semibold">
                    <div class="flex gap-2 items-center">
                        <div class="badge bg-green-400 badge-xs"></div>
                        <p class="text-sm">Open</p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <div class="badge bg-[#A855F7] badge-xs"></div>
                        <p class="text-sm">Closed</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- location of spinner -->

        <section id="card-container"
            class="p-6 w-full rounded-b-md shadow-md bg-[#FBFBFB] grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 justify-center">



        </section>
    </main>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_2.showModal()">open modal</button> -->
    <dialog id="issue_modal" class="modal">
        <div class="modal-box">
            <div id="modal-container">

            </div>
            <form method="dialog" class="modal-backdrop flex flex-row-reverse px-5">
                <button class="btn btn-primary w-24">Close</button>
            </form> 
        </div>
    </dialog>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <!-- <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div id="modal-container" class="modal-box">
            
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog> -->

    <script src="./js/home.js"></script>
</body>

</html>
